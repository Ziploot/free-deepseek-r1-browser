<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek R1 — Browser WebGPU Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #000510;
      --panel: rgba(8, 14, 42, 0.72);
      --panel-hard: #050c22;
      --border: rgba(255,255,255,0.07);
      --border-lit: rgba(100,110,255,0.3);
      --ink-0: #ffffff;
      --ink-1: #e2e8f0;
      --ink-2: #94a3b8;
      --ink-3: #3d4f6b;
      --v: #818cf8;
      --p: #c084fc;
      --c: #22d3ee;
      --g: #4ade80;
      --grd-a: linear-gradient(135deg,#818cf8,#c084fc,#22d3ee);
      --font-d: 'Syne', sans-serif;
      --font-m: 'Space Mono', monospace;
      --font-b: 'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--void);
      background-image: radial-gradient(circle, rgba(129,140,248,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      color: var(--ink-2);
      font-family: var(--font-b);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(95px);
      opacity: 0.12;
      width: 600px;
      height: 600px;
    }
    body::before { background: radial-gradient(circle,#818cf8 0%,transparent 70%); top:-200px; left:-200px; }
    body::after  { background: radial-gradient(circle,#22d3ee 0%,transparent 70%); bottom:-200px; right:-200px; }

    .app-wrap {
      width: 100%; max-width: 1100px; margin: 0 auto;
      padding: 24px 16px; display: flex; flex-direction: column;
      flex: 1; z-index: 10; height: 100vh; max-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--panel); border: 1px solid var(--border-lit);
      border-radius: 20px; padding: 16px 24px; backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo { font-family: var(--font-d); font-size: 20px; font-weight: 800; color: var(--ink-0); display: flex; align-items: center; gap: 6px; }
    .logo span { background: var(--grd-a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .status-badge { font-family: var(--font-m); font-size: 11px; padding: 6px 14px; border-radius: 100px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .status-dot.active { background: var(--g); box-shadow: 0 0 8px var(--g); animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.6; } }

    /* LAYOUT */
    .app-body { display: grid; grid-template-columns: 300px 1fr; gap: 16px; flex: 1; min-height: 0; margin-bottom: 16px; }

    /* SIDEBAR */
    .sidebar { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 16px; backdrop-filter: blur(20px); overflow-y: auto; }
    .control-label { font-family: var(--font-m); font-size: 11px; letter-spacing: 1px; color: var(--ink-3); text-transform: uppercase; font-weight: bold; }
    select {
      width: 100%; background: rgba(2,6,24,0.8); border: 1px solid var(--border-lit);
      border-radius: 10px; color: var(--ink-1); padding: 10px 12px;
      font-family: var(--font-b); font-size: 13px; outline: none; transition: all 0.25s;
    }
    select:focus { border-color: var(--c); box-shadow: 0 0 10px rgba(34,211,238,0.15); }
    .btn-load {
      width: 100%; background: var(--grd-a); color: #fff;
      font-family: var(--font-d); font-weight: 700; font-size: 14px;
      border: none; border-radius: 10px; padding: 12px;
      cursor: pointer; box-shadow: 0 4px 20px rgba(129,140,248,0.3);
      transition: all 0.25s;
    }
    .btn-load:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(129,140,248,0.45); }
    .btn-load:disabled { background: var(--ink-3); color: var(--ink-2); transform: none; box-shadow: none; cursor: not-allowed; }

    /* PROGRESS */
    .progress-container { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: none; flex-direction: column; gap: 8px; }
    .progress-text { font-family: var(--font-m); font-size: 11px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress-track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--grd-a); transition: width 0.3s ease; box-shadow: 0 0 10px var(--c); }

    /* ERROR PANEL */
    .error-panel { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.35); color: #fca5a5; padding: 12px 16px; border-radius: 12px; font-family: var(--font-m); font-size: 11px; display: none; word-break: break-all; line-height: 1.6; }

    /* STATS */
    .stats-panel { border-top: 1px solid var(--border); padding-top: 16px; margin-top: auto; display: flex; flex-direction: column; gap: 10px; font-family: var(--font-m); font-size: 12px; }
    .stat-row { display: flex; justify-content: space-between; color: var(--ink-2); }
    .stat-row span:last-child { color: var(--c); font-weight: bold; }

    /* CHAT */
    .chat-container { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; backdrop-filter: blur(20px); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
    .chat-messages { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

    .msg-row { display: flex; width: 100%; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .bubble { max-width: 80%; padding: 14px 18px; border-radius: 16px; font-size: 15px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
    .user .bubble { background: rgba(129,140,248,0.15); border: 1px solid rgba(129,140,248,0.3); color: var(--ink-0); border-bottom-right-radius: 4px; }
    .assistant .bubble { background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: var(--ink-1); border-top-left-radius: 4px; }

    .think-block { background: rgba(34,211,238,0.04); border-left: 3px solid var(--c); padding: 12px 16px; border-radius: 0 12px 12px 0; margin-bottom: 12px; font-size: 14px; color: var(--ink-2); }
    .think-header { font-family: var(--font-m); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--c); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .think-loader { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--c); animation: thinkPulse 1.2s infinite; }
    @keyframes thinkPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

    code { font-family: var(--font-m); font-size: 13px; background: rgba(0,0,0,0.4); padding: 2px 6px; border-radius: 4px; color: var(--c); }
    pre { background: #020b1a; border: 1px solid var(--border); border-radius: 12px; padding: 16px; overflow-x: auto; margin: 10px 0; }
    pre code { background: none; padding: 0; }

    /* INPUT */
    .chat-input-wrap { padding: 16px 24px 24px; border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 10px; background: rgba(2,6,24,0.7); border: 1px solid var(--border-lit); border-radius: 14px; padding: 8px 12px; align-items: flex-end; transition: border-color 0.25s; }
    .input-row:focus-within { border-color: var(--v); box-shadow: 0 0 12px rgba(129,140,248,0.15); }
    textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--ink-0); font-family: var(--font-b); font-size: 15px; resize: none; min-height: 24px; max-height: 120px; scrollbar-width: none; padding: 2px 0; }
    .btn-send { width: 40px; height: 40px; flex-shrink: 0; border-radius: 10px; background: var(--grd-a); border: none; cursor: pointer; display: grid; place-items: center; color: #fff; padding: 0; transition: transform 0.2s; }
    .btn-send:hover { transform: scale(1.07); }
    .btn-send:disabled { background: var(--ink-3); transform: none; cursor: not-allowed; opacity: 0.5; }

    @media (max-width: 768px) {
      .app-body { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .chat-container { order: 1; height: 60vh; }
      .app-wrap { height: auto; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="app-wrap">

    <header>
      <div class="logo"><span>DeepSeek R1</span> Browser Sandbox</div>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Loading AI Engine...</span>
      </div>
    </header>

    <div class="app-body">

      <div class="sidebar">
        <div>
          <div class="control-label" style="margin-bottom:8px">Select Model</div>
          <select id="modelSelect" disabled>
            <option value="DeepSeek-R1-Distill-Qwen-1.5B-q4f16_1-MLC">DeepSeek-R1-Distill (Qwen 1.5B — 900MB)</option>
            <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">Llama-3.2 (1B Params — 600MB)</option>
          </select>
        </div>

        <button class="btn-load" id="btnLoad" disabled>Loading Engine...</button>

        <div class="progress-container" id="progressContainer">
          <div class="progress-text" id="progressText">Initializing...</div>
          <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="error-panel" id="errorPanel"></div>

        <div class="stats-panel">
          <div class="control-label">Metrics & Hardware</div>
          <div class="stat-row"><span>Device</span><span id="statDevice">Detecting...</span></div>
          <div class="stat-row"><span>Speed</span><span id="statSpeed">— t/s</span></div>
        </div>
      </div>

      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="msg-row assistant">
            <div class="bubble">Hello! I'm DeepSeek-R1 running in your browser via WebGPU. Click <strong>Initialize Model</strong> to load the AI, then start chatting!</div>
          </div>
        </div>
        <div class="chat-input-wrap">
          <div class="input-row">
            <textarea id="promptInput" placeholder="Type here and press Enter…" rows="1"></textarea>
            <button class="btn-send" id="btnSend" title="Send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    // ── DOM refs ──────────────────────────────────────────────────────
    const statusDot      = document.getElementById("statusDot");
    const statusText     = document.getElementById("statusText");
    const modelSelect    = document.getElementById("modelSelect");
    const btnLoad        = document.getElementById("btnLoad");
    const progressBox    = document.getElementById("progressContainer");
    const progressText   = document.getElementById("progressText");
    const progressBar    = document.getElementById("progressBar");
    const errorPanel     = document.getElementById("errorPanel");
    const chatMessages   = document.getElementById("chatMessages");
    const promptInput    = document.getElementById("promptInput");
    const btnSend        = document.getElementById("btnSend");
    const statDevice     = document.getElementById("statDevice");
    const statSpeed      = document.getElementById("statSpeed");

    function showError(msg) {
      errorPanel.style.display = "block";
      errorPanel.textContent = "⚠ " + msg;
      statusText.textContent = "Error";
    }

    function addBubble(text, role) {
      const row = document.createElement("div");
      row.className = "msg-row " + role;
      row.innerHTML = `<div class="bubble">${text}</div>`;
      chatMessages.appendChild(row);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return row.querySelector(".bubble");
    }

    // ── 1. Load WebLLM via dynamic import (catches load failures) ─────
    let CreateMLCEngine = null;

    try {
      // Try primary CDN
      const m = await import("https://esm.run/@mlc-ai/web-llm");
      CreateMLCEngine = m.CreateMLCEngine;
      if (!CreateMLCEngine) throw new Error("CreateMLCEngine not found in exports: " + Object.keys(m).join(", "));
    } catch (e1) {
      try {
        // Fallback CDN
        const m2 = await import("https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm");
        CreateMLCEngine = m2.CreateMLCEngine;
        if (!CreateMLCEngine) throw new Error("Not found in fallback either");
      } catch (e2) {
        showError("Could not load AI engine from CDN. Error: " + e1.message + " | Fallback: " + e2.message);
        statusText.textContent = "Engine load failed";
        throw e2;
      }
    }

    // ── 2. Check WebGPU ───────────────────────────────────────────────
    if (!navigator.gpu) {
      showError("WebGPU is not supported in this browser. Use Chrome or Edge with hardware acceleration enabled.");
      statusText.textContent = "WebGPU Missing";
    } else {
      navigator.gpu.requestAdapter().then(a => {
        if (a) statDevice.textContent = a.info?.device || "WebGPU GPU";
        else   statDevice.textContent = "No GPU adapter";
      });
    }

    // ── 3. Engine state ────────────────────────────────────────────────
    let engine  = null;
    let isBusy  = false;

    btnLoad.textContent = "Initialize Model";
    btnLoad.disabled = false;
    modelSelect.disabled = false;
    statusText.textContent = "Ready — click Initialize";

    // ── 4. Load model ──────────────────────────────────────────────────
    async function loadModel() {
      if (isBusy) return;
      isBusy = true;
      errorPanel.style.display = "none";
      btnLoad.disabled = true;
      modelSelect.disabled = true;
      promptInput.disabled = true;
      btnSend.disabled = true;
      progressBox.style.display = "flex";
      progressBar.style.width = "0%";
      progressText.textContent = "Starting download...";
      statusText.textContent = "Downloading...";

      try {
        engine = await CreateMLCEngine(
          modelSelect.value,
          {
            initProgressCallback: (r) => {
              const pct = Math.round((r.progress || 0) * 100);
              progressBar.style.width = pct + "%";
              progressText.textContent = r.text || ("Loading " + pct + "%");
              statusText.textContent = pct + "% loaded";
            }
          }
        );

        progressBox.style.display = "none";
        statusDot.classList.add("active");
        statusText.textContent = "Online / Local";
        btnLoad.textContent = "✓ Model Loaded";
        promptInput.disabled = false;
        btnSend.disabled = false;
        promptInput.focus();
        addBubble("Model loaded! I'm ready. What do you want to know?", "assistant");

      } catch (err) {
        engine = null;
        showError("Model failed: " + (err.message || err));
        progressBox.style.display = "none";
        btnLoad.textContent = "Retry Initialize";
        btnLoad.disabled = false;
        modelSelect.disabled = false;
        promptInput.disabled = false;
        btnSend.disabled = false;
      } finally {
        isBusy = false;
      }
    }

    btnLoad.addEventListener("click", loadModel);

    // ── 5. Chat ────────────────────────────────────────────────────────
    async function handleSend() {
      const prompt = promptInput.value.trim();
      if (!prompt || isBusy) return;

      if (!engine) {
        addBubble("⚠ Please click <strong>Initialize Model</strong> first.", "assistant");
        return;
      }

      isBusy = true;
      promptInput.disabled = true;
      btnSend.disabled = true;

      addBubble(escHtml(prompt), "user");
      promptInput.value = "";
      promptInput.style.height = "auto";
      chatMessages.scrollTop = chatMessages.scrollHeight;

      // Create streaming assistant bubble
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      row.innerHTML = `<div class="bubble">
        <div class="think-block" style="display:none">
          <div class="think-header"><span class="think-loader"></span> Thinking…</div>
          <div class="think-content" style="white-space:pre-wrap;font-size:13px;color:var(--ink-2)"></div>
        </div>
        <div class="answer-content">▌</div>
      </div>`;
      chatMessages.appendChild(row);

      const thinkBlock   = row.querySelector(".think-block");
      const thinkContent = row.querySelector(".think-content");
      const answerDiv    = row.querySelector(".answer-content");

      let accumulated = "";
      let startTime   = performance.now();
      let tokens      = 0;

      try {
        const stream = await engine.chat.completions.create({
          messages: [{ role: "user", content: prompt }],
          stream: true
        });

        for await (const chunk of stream) {
          const delta = chunk.choices[0]?.delta?.content || "";
          accumulated += delta;
          tokens++;

          const elapsed = (performance.now() - startTime) / 1000;
          statSpeed.textContent = Math.round(tokens / elapsed) + " t/s";

          // Parse <think>…</think>
          const ti = accumulated.indexOf("<think>");
          const te = accumulated.indexOf("</think>");
          if (ti !== -1) {
            thinkBlock.style.display = "block";
            if (te !== -1) {
              thinkContent.textContent = accumulated.slice(ti + 7, te).trim();
              thinkBlock.querySelector(".think-loader").style.display = "none";
              answerDiv.innerHTML = renderMd(accumulated.slice(te + 8).trim()) || "▌";
            } else {
              thinkContent.textContent = accumulated.slice(ti + 7).trim();
              answerDiv.innerHTML = "▌";
            }
          } else {
            answerDiv.innerHTML = renderMd(accumulated) || "▌";
          }

          chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Final clean-up — remove cursor
        if (answerDiv.innerHTML.endsWith("▌")) {
          answerDiv.innerHTML = answerDiv.innerHTML.slice(0, -1);
        }

      } catch (err) {
        answerDiv.textContent = "Error during generation: " + (err.message || err);
      } finally {
        isBusy = false;
        promptInput.disabled = false;
        btnSend.disabled = false;
        promptInput.focus();
      }
    }

    // ── Helpers ────────────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function renderMd(text) {
      let h = escHtml(text);
      h = h.replace(/```[\w]*\n([\s\S]*?)```/g, (_,c) => `<pre><code>${c}</code></pre>`);
      h = h.replace(/`([^`]+)`/g, "<code>$1</code>");
      h = h.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      h = h.replace(/^### (.+)$/gm, "<h4 style=\"color:var(--ink-0);margin:8px 0 4px\">$1</h4>");
      h = h.replace(/^## (.+)$/gm,  "<h3 style=\"color:var(--ink-0);margin:10px 0 5px\">$1</h3>");
      h = h.replace(/^\* (.+)$/gm,  "<li>$1</li>");
      return h;
    }

    // ── Event bindings ─────────────────────────────────────────────────
    btnSend.addEventListener("click", handleSend);

    promptInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });

    promptInput.addEventListener("input", () => {
      promptInput.style.height = "auto";
      promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + "px";
    });

  </script>
</body>
</html>
